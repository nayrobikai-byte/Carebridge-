<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareBridge Login</title>

<link rel="stylesheet" href="assets/css/style.css">

<style>
.login-container{
    max-width:500px;
    margin:80px auto;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.login-container h1{
    text-align:center;
    margin-bottom:20px;
    color:#0A2342;
}

.login-container p{
    text-align:center;
    margin-bottom:30px;
    color:#666;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.form-control{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:6px;
}

.login-btn{
    width:100%;
    background:#D4AF37;
    color:#0A2342;
    border:none;
    padding:14px;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

.login-btn:hover{
    opacity:.9;
}

.links{
    text-align:center;
    margin-top:20px;
}

.links a{
    color:#1B998B;
    text-decoration:none;
}

.role-select{
    margin-bottom:20px;
}
</style>

</head>
<body>

<header>
<div class="navbar">
<div class="logo">CareBridge</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="jobs.html">Jobs</a>
<a href="signup.html">Sign Up</a>
<a href="contact.html">Contact</a>
</div>
</div>
</header>

<div class="login-container">

<h1>Welcome Back</h1>

<p>Sign in to your CareBridge account</p>

<form>

<div class="role-select">
<label>Account Type</label>
<select class="form-control">
<option>Healthcare Professional</option>
<option>Employer</option>
<option>Administrator</option>
</select>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email"
class="form-control"
placeholder="Enter your email">
</div>

<div class="form-group">
<label>Password</label>
<input type="password"
class="form-control"
placeholder="Enter your password">
</div>

<button type="submit" class="login-btn">
Login
</button>

</form>

<div class="links">

<p>
<a href="#">Forgot Password?</a>
</p>

<p>
Don't have an account?
<a href="signup.html">Create Account</a>
</p>

</div>

</div>

<footer>
<p>
© 2026 CareBridge Healthcare Staffing & Contracting
</p>
</footer>

</body>
</html>
