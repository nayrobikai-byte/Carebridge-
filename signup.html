<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareBridge Sign Up</title>

<link rel="stylesheet" href="assets/css/style.css">

<style>
.signup-container{
    max-width:700px;
    margin:60px auto;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.signup-container h1{
    text-align:center;
    color:#0A2342;
    margin-bottom:10px;
}

.signup-container p{
    text-align:center;
    margin-bottom:25px;
}

.form-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.form-control{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:6px;
}

.signup-btn{
    width:100%;
    background:#D4AF37;
    color:#0A2342;
    border:none;
    padding:14px;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

.signup-btn:hover{
    opacity:.9;
}

@media(max-width:768px){
    .form-row{
        grid-template-columns:1fr;
    }
}
</style>

</head>
<body>

<header>
<div class="navbar">
<div class="logo">CareBridge</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="jobs.html">Jobs</a>
<a href="login.html">Login</a>
</div>
</div>
</header>

<div class="signup-container">

<h1>Create Your Account</h1>

<p>Join CareBridge today</p>

<form>

<div class="form-row">

<div class="form-group">
<label>First Name</label>
<input type="text" class="form-control">
</div>

<div class="form-group">
<label>Last Name</label>
<input type="text" class="form-control">
</div>

</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" class="form-control">
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" class="form-control">
</div>

<div class="form-group">
<label>Account Type</label>
<select class="form-control">
<option>Healthcare Professional</option>
<option>Employer</option>
</select>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" class="form-control">
</div>

<div class="form-group">
<label>Confirm Password</label>
<input type="password" class="form-control">
</div>

<button type="submit" class="signup-btn">
Create Account
</button>

</form>

</div>

<footer>
<p>© 2026 CareBridge Healthcare Staffing & Contracting</p>
</footer>

</body>
</html>
